name: Notionデータ更新 & デプロイ

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日9時（JST = UTC 0時）
  workflow_dispatch:      # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install requests

      - name: Notionからデータ取得
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/fetch_notion.py

      - name: data.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: Notionデータ更新 $(date '+%Y/%m/%d')"
          git push

      - name: GitHub Pages デプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scripts,README.md'
