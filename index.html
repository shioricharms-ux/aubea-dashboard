<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ビジネス活動</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">

    <!-- サイドナビ -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">S</div>
        <span class="brand-name">しおりさん</span>
      </div>

      <div class="nav-section-label">マネジメント</div>
      <ul class="nav-list">
        <li class="nav-item active" onclick="showPanel('all')">📊 ダッシュボード</li>
        <li class="nav-item" onclick="showPanel('cases')">📋 案件</li>
        <li class="nav-item" onclick="showPanel('tasks')">✅ タスク</li>
        <li class="nav-item" onclick="showPanel('initiatives')">🚀 イニシアティブ</li>
      </ul>

      <div class="nav-section-label">よく使う</div>
      <ul class="nav-list">
        <li class="nav-item" onclick="showPanel('notes')">📝 ノート</li>
        <li class="nav-item" onclick="showPanel('finance')">💰 売上・稼働</li>
      </ul>

      <div class="sidebar-footer" id="updatedAt">更新中...</div>
    </nav>

    <!-- メインコンテンツ -->
    <main class="main">

      <!-- ヒーロー -->
      <div class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 class="hero-title">ビジネス活動</h1>
          <div class="hero-kpi" id="hero-kpi"></div>
        </div>
      </div>

      <!-- ダッシュボード（4パネル） -->
      <div id="panel-all" class="panel-wrapper active">
        <div class="dashboard-grid">

          <!-- 左上：直近のタスク -->
          <div class="db-card">
            <div class="db-card-header">
              <span class="db-card-title">✅ 直近のタスク</span>
              <div class="db-view-tabs">
                <span class="db-tab active">リスト</span>
              </div>
            </div>
            <div id="dash-tasks" class="task-list"></div>
          </div>

          <!-- 右上：イニシアティブ・ガントチャート -->
          <div class="db-card">
            <div class="db-card-header">
              <span class="db-card-title">🚀 イニシアティブ・ガントチャート</span>
              <div class="db-view-tabs">
                <span class="db-tab active">タイムライン</span>
                <span class="db-tab" onclick="toggleGanttTable(this)">テーブル</span>
              </div>
            </div>
            <div id="dash-gantt"></div>
          </div>

          <!-- 左下：ノート -->
          <div class="db-card">
            <div class="db-card-header">
              <span class="db-card-title">📝 ノート</span>
              <div class="db-view-tabs">
                <span class="db-tab active">ボード</span>
              </div>
            </div>
            <div id="dash-notes" class="notes-board"></div>
          </div>

          <!-- 右下：売上・稼働 -->
          <div class="db-card">
            <div class="db-card-header">
              <span class="db-card-title">💰 売上・稼働</span>
              <div class="db-view-tabs">
                <span class="db-tab active">グラフ</span>
              </div>
            </div>
            <div id="dash-finance"></div>
          </div>

        </div>
      </div>

      <!-- 案件一覧 -->
      <div id="panel-cases" class="panel-wrapper">
        <div class="panel-header">
          <h2 class="panel-title">📋 案件一覧</h2>
          <div class="filter-bar">
            <button class="filter-btn active" onclick="filterCases('all',this)">すべて</button>
            <button class="filter-btn" onclick="filterCases('進行中',this)">進行中</button>
            <button class="filter-btn" onclick="filterCases('商談中',this)">商談中</button>
            <button class="filter-btn" onclick="filterCases('完了',this)">完了</button>
            <button class="filter-btn" onclick="filterCases('保留',this)">保留</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>案件名</th><th>事業種別</th><th>ステータス</th><th>担当者</th><th>期限</th><th>金額</th></tr></thead>
            <tbody id="cases-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- タスク一覧 -->
      <div id="panel-tasks" class="panel-wrapper">
        <div class="panel-header">
          <h2 class="panel-title">✅ タスク管理</h2>
          <div class="filter-bar">
            <button class="filter-btn active" onclick="filterTasks('all',this)">すべて</button>
            <button class="filter-btn" onclick="filterTasks('未着手',this)">未着手</button>
            <button class="filter-btn" onclick="filterTasks('進行中',this)">進行中</button>
            <button class="filter-btn" onclick="filterTasks('保留',this)">保留</button>
            <button class="filter-btn" onclick="filterTasks('完了',this)">完了</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>タスク名</th><th>案件</th><th>担当者</th><th>優先度</th><th>ステータス</th><th>期限</th></tr></thead>
            <tbody id="tasks-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- イニシアティブ -->
      <div id="panel-initiatives" class="panel-wrapper">
        <div class="panel-header">
          <h2 class="panel-title">🚀 イニシアティブ</h2>
        </div>
        <div id="initiatives-full"></div>
      </div>

      <!-- ノート -->
      <div id="panel-notes" class="panel-wrapper">
        <div class="panel-header">
          <h2 class="panel-title">📝 ノート</h2>
        </div>
        <div id="notes-full" class="notes-board"></div>
      </div>

      <!-- 売上・稼働 -->
      <div id="panel-finance" class="panel-wrapper">
        <div class="panel-header">
          <h2 class="panel-title">💰 売上・稼働</h2>
        </div>
        <div id="finance-full"></div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
